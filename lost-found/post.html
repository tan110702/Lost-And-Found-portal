<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Post Item | Lost & Found</title>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="view.html">Lost & Found</a>
    <a href="view.html">Items</a>
    <a class="active" href="post.html">Post Item</a>
    <a href="claims.html">Claims</a>
    <button class="secondary" onclick="logout()">Logout</button>
  </nav>

  <main class="page">
    <div class="container">
      <div class="page-title">
        <div>
          <h1>Post an Item</h1>
          <p>Add enough detail so the right owner or finder can recognize it.</p>
        </div>
        <a class="button secondary" href="view.html">View Items</a>
      </div>

      <section class="panel">
        <div id="notice" class="notice"></div>

        <label for="title">Item title</label>
        <input id="title" placeholder="Black wallet, blue water bottle, keys...">

        <label for="desc">Description</label>
        <textarea id="desc" placeholder="Mention color, brand, date, unique marks, or any helpful clue."></textarea>

        <label for="type">Type</label>
        <select id="type">
          <option value="lost">Lost</option>
          <option value="found">Found</option>
        </select>

        <label for="location">Location</label>
        <input id="location" placeholder="Library, cafeteria, parking area...">

        <label for="image">Image</label>
        <input type="file" id="image" accept="image/*">

        <div class="form-actions">
          <button onclick="addItem()">Submit Item</button>
          <button class="secondary" onclick="clearPostForm()">Clear</button>
        </div>
      </section>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    requireLogin();
  </script>
</body>
</html>
