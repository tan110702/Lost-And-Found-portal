<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Items | Lost & Found</title>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="view.html">Lost & Found</a>
    <a class="active" href="view.html">Items</a>
    <a href="post.html">Post Item</a>
    <a href="claims.html">Claims</a>
    <button class="secondary" onclick="logout()">Logout</button>
  </nav>

  <main class="page">
    <div class="container">
      <div class="page-title">
        <div>
          <h1>Lost & Found Board</h1>
          <p>Search, filter, and claim items from one clean dashboard.</p>
        </div>
        <a class="button" href="post.html">Post Item</a>
      </div>

      <section class="stats">
        <div class="stat"><span class="muted">All items</span><strong id="totalCount">0</strong></div>
        <div class="stat"><span class="muted">Lost</span><strong id="lostCount">0</strong></div>
        <div class="stat"><span class="muted">Found</span><strong id="foundCount">0</strong></div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <input id="search" placeholder="Search title, description, or location..." oninput="applyItemFilters()">
          <select id="typeFilter" onchange="applyItemFilters()">
            <option value="all">All types</option>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
          </select>
          <select id="statusFilter" onchange="applyItemFilters()">
            <option value="all">All claim statuses</option>
            <option value="none">No claims</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>

        <div id="notice" class="notice"></div>
        <div id="items" class="grid"></div>
      </section>
    </div>
  </main>

  <div id="claimModal" class="modal-backdrop">
    <section class="modal">
      <h2>Verify Your Claim</h2>
      <p>Enter your phone number so the item owner can verify and contact you.</p>

      <label for="claimPhone">Phone number</label>
      <input id="claimPhone" type="tel" placeholder="Enter your phone number">

      <label for="claimMessage">Verification note</label>
      <textarea id="claimMessage" placeholder="Optional: add a detail that helps verify this is your item."></textarea>

      <div class="form-actions">
        <button onclick="submitClaim()">Submit Claim</button>
        <button class="secondary" onclick="closeClaimModal()">Cancel</button>
      </div>
    </section>
  </div>

  <script src="js/app.js"></script>
  <script>
    requireLogin();
    loadItems();
  </script>
</body>
</html>
