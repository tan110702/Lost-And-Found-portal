<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Login | Lost & Found</title>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Welcome back</h1>
      <p>Log in to post items, claim belongings, and review requests.</p>

      <div id="notice" class="notice"></div>

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email">

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Your password" autocomplete="current-password">

      <div class="form-actions">
        <button onclick="login()">Login</button>
      </div>

      <p class="link-row">New here? <a href="register.html">Create an account</a></p>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script>
    redirectIfLoggedIn();
  </script>
</body>
</html>
