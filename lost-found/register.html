<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Register | Lost & Found</title>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Create account</h1>
      <p>Join the community board and help reunite people with their items.</p>

      <div id="notice" class="notice"></div>

      <label for="name">Name</label>
      <input id="name" placeholder="Your name" autocomplete="name">

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email">

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="At least 6 characters" autocomplete="new-password">

      <div class="form-actions">
        <button onclick="register()">Register</button>
      </div>

      <p class="link-row">Already registered? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script>
    redirectIfLoggedIn();
  </script>
</body>
</html>
